services:
  job-tracker:
    build: .
    container_name: sena-job-tracker
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Database lives outside the container so it survives rebuilds
      - /volume1/docker/job-tracker/data:/data
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_PATH: /data/jobs.db
      # BASE_PATH: ""   # uncomment and set if serving under a subpath
